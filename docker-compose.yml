services:
  trainer:
    build: .
    command: python -m src.train_model
    environment: &lab_env
      LLM_MODE: ${LLM_MODE:-fallback}
      LLM_PROVIDER: ${LLM_PROVIDER:-openai}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_MODEL: ${OPENAI_MODEL:-gpt-5.4-mini}
      OPENAI_REASONING_EFFORT: ${OPENAI_REASONING_EFFORT:-low}
      OPENAI_TEXT_VERBOSITY: ${OPENAI_TEXT_VERBOSITY:-low}
    volumes: &lab_volumes
      - ./data:/app/data
      - ./models:/app/models
    restart: "no"

  simulator:
    build: .
    command: python -m lab.simulator.simulate_events --scenario mixed --count 700 --output data/logs/events.jsonl --replace
    depends_on:
      trainer:
        condition: service_completed_successfully
    environment: *lab_env
    volumes: *lab_volumes
    restart: "no"

  detector:
    build: .
    command: python -m src.detect --input data/logs/events.jsonl --output data/logs/alerts.jsonl
    depends_on:
      simulator:
        condition: service_completed_successfully
    environment: *lab_env
    volumes: *lab_volumes
    restart: "no"

  advisor:
    build: .
    command: python -m src.llm_advisor --alerts data/logs/alerts.jsonl --output data/logs/llm_recommendations.jsonl
    depends_on:
      detector:
        condition: service_completed_successfully
    environment: *lab_env
    volumes: *lab_volumes
    restart: "no"

  exporter:
    build: .
    command: python -m src.evidence_exporter
    depends_on:
      advisor:
        condition: service_completed_successfully
    environment: *lab_env
    volumes: *lab_volumes
    restart: "no"

  lab-web:
    build: .
    command: python -m lab.web_app.app
    ports:
      - "5001:5000"
    environment: *lab_env
    volumes: *lab_volumes
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:5000/health')"]
      interval: 10s
      timeout: 5s
      retries: 5

  detection-api:
    build: .
    command: uvicorn api.main:app --host 0.0.0.0 --port 8000
    depends_on:
      trainer:
        condition: service_completed_successfully
    ports:
      - "8000:8000"
    environment: *lab_env
    volumes: *lab_volumes
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 10s
      timeout: 5s
      retries: 5

  frontend:
    build:
      context: ./frontend
    depends_on:
      detection-api:
        condition: service_healthy
      exporter:
        condition: service_completed_successfully
    ports:
      - "8501:5173"
    environment:
      VITE_API_BASE_URL: http://127.0.0.1:8000
    volumes:
      - ./frontend/src:/app/src
      - ./frontend/index.html:/app/index.html
      - ./frontend/vite.config.ts:/app/vite.config.ts
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:5173"]
      interval: 10s
      timeout: 5s
      retries: 10
